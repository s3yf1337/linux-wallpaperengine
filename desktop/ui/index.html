<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallpaper Engine — Linux</title>
<style>
  :root{
    --bg:#121214;        /* background */
    --surface:#1E1E22;   /* cards / panels */
    --text:#E5E7EB;      /* primary text */
    --dim:#9CA3AF;       /* secondary text */
    --border:#2D2D34;    /* borders / dividers */
    --accent:#FF6600;    /* accent */
    --accent-h:#E65C00;  /* accent hover/active */
    --soft:#3D2010;      /* soft accent / row highlight / badges */
  }
  *{ box-sizing:border-box; border-radius:0; }
  html,body{ height:100%; margin:0; color-scheme: dark; }
  body{
    background:#121214 !important;
    color:var(--text);
    font-family:"Inter","Segoe UI",ui-sans-serif,system-ui,-apple-system,sans-serif;
    font-size:13px;
    line-height:1.4;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  button{ font-family:inherit; -webkit-appearance:none; appearance:none; }
  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-track{ background:var(--bg); }
  ::-webkit-scrollbar-thumb{ background:#2D2D34; border:2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover{ background:#3D2010; }

  /* ---------- shared ---------- */
  .i{ width:15px; height:15px; flex:0 0 auto; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .i-sm{ width:11px; height:11px; }
  .i-lg{ width:18px; height:18px; }

  .badge{
    display:inline-flex; align-items:center;
    background:var(--soft); color:var(--text);
    font-size:10px; letter-spacing:.02em;
    padding:1px 6px; white-space:nowrap;
  }

  .btn{
    font-size:13px; color:var(--text);
    background:var(--surface); border:1px solid var(--border);
    padding:7px 12px; cursor:pointer;
    display:inline-flex; align-items:center; gap:7px;
    transition:border-color .12s, background .12s, color .12s, transform .2s cubic-bezier(.16,.8,.3,1);
  }
  .btn:hover{ border-color:var(--accent); }
  .btn-accent{ background:var(--accent); border-color:var(--accent); color:#121214; font-weight:600; }
  .btn-accent:hover{ background:var(--accent-h); border-color:var(--accent-h); }
  .btn:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible{
    outline:2px solid var(--accent); outline-offset:1px;
  }

  .link-btn{ background:transparent; border:0; color:var(--dim); cursor:pointer; font-size:12px; padding:0; text-decoration:underline; text-underline-offset:2px; }
  .link-btn:hover{ color:var(--accent); }

  /* magnetic buttons — layer only while active */
  .magnetic{
    transition: transform .2s cubic-bezier(.16,.8,.3,1), border-color .12s, background .12s, color .12s;
  }
  .magnetic.is-mag{ will-change: transform; }

  /* ---------- app shell ---------- */
  .app{ display:flex; flex-direction:column; height:100vh; }

  .titlebar{
    height:40px; flex:0 0 40px;
    background:var(--surface); border-bottom:1px solid var(--border);
    display:flex; align-items:center; padding:0 12px; gap:18px;
  }
  .brand{ display:flex; align-items:center; gap:9px; }
  .brand .logo{ width:14px; height:14px; background:var(--accent); }
  .brand-name{ font-size:14px; font-weight:600; letter-spacing:.01em; }
  .brand-sub{ color:var(--dim); font-size:12px; }
  .menu{ display:flex; gap:2px; }
  .menu button{
    background:transparent; border:0; color:var(--dim);
    font-size:12px; padding:4px 8px; cursor:pointer;
  }
  .menu button:hover{ color:var(--text); background:var(--soft); }
  .title-actions{ margin-left:auto; display:flex; align-items:center; gap:4px; }
  .tbtn{
    width:30px; height:30px; display:flex; align-items:center; justify-content:center;
    color:var(--dim); background:transparent; border:1px solid transparent; cursor:pointer;
    transition:color .12s, border-color .12s, background .12s, transform .2s cubic-bezier(.16,.8,.3,1);
  }
  .tbtn:hover{ color:var(--text); border-color:var(--border); background:var(--soft); }
  .tbtn:disabled, .title-actions .tbtn.is-placeholder{
    opacity:.28; cursor:default; pointer-events:none;
  }
  .tbtn:disabled:hover, .title-actions .tbtn.is-placeholder:hover{
    color:var(--dim); border-color:transparent; background:transparent;
  }


  .title-drag{ flex:1; height:100%; min-width:12px; }
  .titlebar .menu, .titlebar .title-actions, .titlebar .menu button, .titlebar .tbtn{
    -webkit-app-region: no-drag;
  }
  .titlebar [data-tauri-drag-region]{ -webkit-app-region: drag; cursor: default; }

  .workspace{ flex:1; display:flex; min-height:0; }

  /* ---------- sidebar ---------- */
  .sidebar{
    width:236px; flex:0 0 236px; background:var(--surface);
    border-right:1px solid var(--border);
    display:flex; flex-direction:column;
    transition:width .18s ease, flex-basis .18s ease;
  }
  .sidebar.collapsed{ width:52px; flex-basis:52px; }
  .side-top{
    height:46px; flex:0 0 46px; display:flex; align-items:center;
    padding:0 12px; border-bottom:1px solid var(--border);
  }
  .sidebar.collapsed .side-top{ justify-content:center; padding:0; }
  .side-toggle{
    display:flex; align-items:center; gap:9px; background:transparent; border:0;
    color:var(--text); cursor:pointer; font-size:13px; font-weight:600; padding:4px 0;
    transition:color .12s;
  }
  .side-toggle:hover{ color:var(--accent); }
  .sidebar.collapsed .side-toggle span{ display:none; }

  /* ---------- Workshop tab / Steam toggle ---------- */
  .side-tabs{ display:flex; flex-direction:column; gap:2px; padding:6px 8px 2px; border-bottom:1px solid var(--border); }
  .side-tab{
    display:flex; align-items:center; gap:9px;
    background:transparent; border:0; border-left:2px solid transparent;
    color:var(--dim); cursor:pointer; font-size:13px; font-weight:600;
    padding:8px 10px; margin:0 -8px;
    transition:background .1s, color .1s, border-color .1s;
    text-align:left; width:100%;
  }
  .side-tab:hover{ background:var(--soft); color:var(--text); }
  .side-tab.active{ background:var(--soft); color:var(--accent); border-left-color:var(--accent); }
  .side-tab.active .tab-label{ color:var(--accent); }
  .side-tab.disabled{ opacity:.38; cursor:not-allowed; pointer-events:none; }
  .side-tab .tab-label{ flex:1; color:inherit; }
  .steam-toggle-wrap{
    display:inline-flex; align-items:center; gap:6px; flex:0 0 auto; padding:2px 4px;
  }
  .steam-ico{ width:14px; height:14px; flex:0 0 auto; fill:var(--dim); transition:fill .12s; }
  .steam-toggle-wrap:hover .steam-ico{ fill:var(--text); }
  .steam-toggle{
    width:28px; height:15px; background:var(--border); border:1px solid var(--border);
    position:relative; cursor:pointer; padding:0; flex:0 0 auto;
    transition:background .12s, border-color .12s;
  }
  .steam-toggle::after{ content:""; position:absolute; top:1px; left:1px; width:11px; height:11px; background:var(--dim); transition:left .15s ease, background .12s; }
  .steam-toggle.on{ background:var(--soft); border-color:var(--accent); }
  .steam-toggle.on::after{ left:14px; background:var(--accent); }
  .steam-toggle-wrap:hover .steam-toggle{ border-color:var(--accent); }
  .side-tab .steam-toggle-wrap{ cursor:pointer; }
  .side-tab.disabled .steam-toggle-wrap{ pointer-events:auto; opacity:1; }
  .sidebar.collapsed .side-tabs{ padding:6px 0 2px; align-items:center; }
  .sidebar.collapsed .side-tab .tab-label{ display:none; }
  .sidebar.collapsed .side-tab .steam-toggle-wrap{ display:none; }

  .side-scroll{ flex:1; overflow-y:auto; }
  .side-block{ padding:12px 12px; border-top:1px solid var(--border); }
  .side-block:first-child{ border-top:0; }
  .side-search{
    display:flex; align-items:center; gap:7px;
    border:1px solid var(--border); background:var(--bg);
    padding:0 8px; height:30px;
    transition:border-color .12s;
  }
  .side-search:focus-within{ border-color:var(--accent); }
  .side-search input{ background:transparent; border:0; outline:0; color:var(--text); font-size:13px; width:100%; }
  .side-search input::placeholder{ color:var(--dim); }

  .side-label{
    font-size:11px; text-transform:uppercase; letter-spacing:.08em;
    color:var(--dim); margin-bottom:6px; display:flex; align-items:center; gap:6px;
  }

  .fitem{
    display:flex; align-items:center; gap:9px;
    padding:6px 8px; cursor:pointer; color:var(--dim);
    border-left:2px solid transparent; margin:0 -8px;
    transition:background .1s, color .1s;
  }
  .fitem:hover{ background:var(--soft); color:var(--text); }
  .fitem.active{ background:var(--soft); color:var(--text); border-left-color:var(--accent); }
  .fitem.active .fname{ color:var(--accent); }
  .fname{ font-size:13px; }
  .fcount{ margin-left:auto; font-size:11px; color:var(--dim); font-variant-numeric:tabular-nums; }

  .chk{
    width:13px; height:13px; border:1px solid var(--border); background:var(--bg);
    appearance:none; -webkit-appearance:none; cursor:pointer; position:relative; flex:0 0 auto;
    transition:background .1s, border-color .1s;
  }
  .chk:checked{ background:var(--accent); border-color:var(--accent); }
  .chk:checked::after{ content:""; position:absolute; left:3px; top:0; width:4px; height:8px; border:solid #121214; border-width:0 2px 2px 0; transform:rotate(45deg); }
  .tag-item.active{ background:var(--soft); }

  .side-rail{ display:none; flex-direction:column; align-items:center; gap:4px; padding:10px 0; }
  .sidebar.collapsed .side-rail{ display:flex; }
  .sidebar.collapsed .side-scroll{ display:none; }
  .rail-btn{
    width:34px; height:34px; display:flex; align-items:center; justify-content:center;
    color:var(--dim); background:transparent; border:0; cursor:pointer;
    transition:background .1s, color .1s;
  }
  .rail-btn:hover{ background:var(--soft); color:var(--text); }
  .rail-btn.accent{ color:var(--accent); }

  /* ---------- center ---------- */
  .content{ flex:1; display:flex; flex-direction:column; min-width:0; }

  .toolbar{
    height:46px; flex:0 0 46px; display:flex; align-items:center; gap:10px;
    padding:0 12px; background:var(--surface); border-bottom:1px solid var(--border);
  }
  .search{
    display:flex; align-items:center; gap:7px; height:30px; width:280px;
    border:1px solid var(--border); background:var(--bg); padding:0 8px;
    transition:border-color .12s;
  }
  .search:focus-within{ border-color:var(--accent); }
  .search input{ background:transparent; border:0; outline:0; color:var(--text); font-size:13px; width:100%; }
  .search input::placeholder{ color:var(--dim); }

  .counter{ font-size:12px; color:var(--dim); font-variant-numeric:tabular-nums; white-space:nowrap; }
  .counter b{ color:var(--text); font-weight:600; }
  .spacer{ flex:1; }

  .scan{ display:flex; align-items:center; gap:8px; font-size:12px; color:var(--dim); white-space:nowrap; }
  .scan .dot{ width:7px; height:7px; background:var(--accent); opacity:.85; }
  .scan.is-on .dot{ animation:pulse 1.4s steps(2, end) infinite; }
  @keyframes pulse{ 0%{opacity:1} 100%{opacity:.3} }
  @media (prefers-reduced-motion: reduce){
    .scan.is-on .dot{ animation:none !important; }
    .magnetic{ transition: border-color .12s, background .12s, color .12s !important; }
  }
  .scan-bar{ width:110px; height:4px; background:var(--border); position:relative; }
  .scan-bar i{ position:absolute; left:0; top:0; height:100%; width:0; background:var(--accent); transition:width .15s linear; }

  .view-toggle{ display:flex; border:1px solid var(--border); }
  .seg2{ width:30px; height:30px; background:transparent; border:0; border-right:1px solid var(--border); color:var(--dim); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .1s, color .1s; }
  .seg2:last-child{ border-right:0; }
  .seg2:hover{ color:var(--text); }
  .seg2.active{ background:var(--soft); color:var(--accent); }

  .grid-wrap{ flex:1; overflow-y:auto; padding:14px; }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(min(100%, 192px), 1fr));
    gap:14px;
    align-items:start; /* never stretch cards to row height */
  }

  .card{
    background:var(--surface); border:1px solid var(--border); cursor:pointer;
    display:flex; flex-direction:column; overflow:hidden; position:relative;
    padding:0; text-align:left; color:inherit;
    transition:border-color .12s;
    height:auto;
    min-height:0;
    align-self:start;
    /* offscreen cards skip paint/layout work in WebKitGTK */
    content-visibility:auto;
    contain-intrinsic-size:auto 220px;
    contain:layout paint style;
  }
  .card:hover{ border-color:var(--accent); }
  .card.selected{ border-color:var(--accent); }
  .card.selected .card-name{ color:var(--accent); }
  .card.selected .sel-dot{ opacity:1; }

  .preview{
    position:relative; aspect-ratio:16/9; background:var(--bg); overflow:hidden;
    flex:0 0 auto; width:100%;
  }
  .preview img{
    width:100%; height:100%; object-fit:cover; display:block;
    /* decode off main thread where supported; avoid upscaling blur cost */
    image-rendering:auto;
  }
  .preview .ph{ position:absolute; inset:0; }
  .type-tag{
    position:absolute; top:6px; left:6px; display:flex; align-items:center; gap:4px;
    background:rgba(18,18,20,.82); color:var(--text); font-size:10px;
    padding:2px 5px; text-transform:uppercase; letter-spacing:.05em;
  }
  .type-tag.lg{ font-size:11px; padding:3px 7px; }
  .sel-dot{
    position:absolute; top:6px; right:6px; width:16px; height:16px;
    background:var(--accent); opacity:0; display:flex; align-items:center; justify-content:center;
    transition:opacity .12s;
  }
  .sel-dot .i{ width:10px; height:10px; stroke:#121214; stroke-width:3; }

  .card-body{ padding:8px 9px 9px; flex:0 0 auto; }
  .card-name{ font-size:13px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-meta{ display:flex; align-items:center; gap:6px; margin-top:3px; font-size:11px; color:var(--dim); }
  .card-meta .sep{ opacity:.6; }
  .card-tags{ display:flex; flex-wrap:wrap; gap:4px; margin-top:7px; }

  .grid-empty{ grid-column:1/-1; padding:70px 20px; text-align:center; color:var(--dim); display:flex; flex-direction:column; align-items:center; gap:14px; }

  /* ---------- detail panel ---------- */
  .detail{
    width:304px; flex:0 0 304px; background:var(--surface);
    border-left:1px solid var(--border); display:flex; flex-direction:column;
    transition:width .18s ease, flex-basis .18s ease; position:relative;
    min-height:0; /* shrink inside workspace flex row so panel can scroll */
  }
  .detail.collapsed{ width:40px; flex-basis:40px; }
  .detail.collapsed .detail-inner{ display:none; }

  /* Fill panel height; det-scroll owns overflow-y (long Wallpaper props). */
  .detail-inner{
    flex:1 1 auto;
    min-height:0;
    height:100%;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  .detail-collapsed-bar{
    display:none; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; height:100%; width:100%; background:transparent; border:0; color:var(--dim);
    cursor:pointer; transition:color .12s;
  }
  .detail-collapsed-bar:hover{ color:var(--accent); }
  .detail.collapsed .detail-collapsed-bar{ display:flex; }
  .vtext{ writing-mode:vertical-rl; transform:rotate(180deg); font-size:11px; letter-spacing:.1em; text-transform:uppercase; }

  .det-head{
    height:40px; flex:0 0 40px; display:flex; align-items:center; justify-content:space-between;
    padding:0 8px 0 14px; border-bottom:1px solid var(--border);
  }
  .det-head-t{ font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--dim); }
  .det-scroll{
    flex:1 1 auto;
    min-height:0;
    overflow-x:hidden;
    overflow-y:auto;
    overscroll-behavior:contain;
    scrollbar-width:thin;
    scrollbar-color:var(--border) transparent;
  }
  .det-scroll::-webkit-scrollbar{ width:8px; }
  .det-scroll::-webkit-scrollbar-track{ background:transparent; }
  .det-scroll::-webkit-scrollbar-thumb{ background:var(--border); border-radius:4px; }
  .det-scroll::-webkit-scrollbar-thumb:hover{ background:var(--dim); }
  .det-preview{ aspect-ratio:16/9; background:var(--bg); border-bottom:1px solid var(--border); position:relative; flex:0 0 auto; }
  .det-preview img{ width:100%; height:100%; object-fit:cover; display:block; }

  .det-body{ padding:14px 14px 24px; }
  .det-title{ font-size:15px; font-weight:600; color:var(--text); word-break:break-word; }
  .det-id{ font-size:11px; color:var(--dim); margin-top:3px; font-variant-numeric:tabular-nums; }

  .det-meta{ margin-top:12px; }
  .mrow{ display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--border); }
  .mrow:last-child{ border-bottom:0; }
  .mrow .k{ display:flex; align-items:center; gap:6px; color:var(--dim); font-size:11px; min-width:88px; }
  .mrow .v{ color:var(--text); font-size:11px; margin-left:auto; text-align:right; font-family:ui-monospace,"SFMono-Regular",Menlo,monospace; max-width:62%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .mrow .v.wrap{ white-space:normal; overflow:visible; text-overflow:clip; word-break:break-word; }

  .det-actions{ display:flex; flex-direction:column; gap:8px; margin-top:16px; }
  .det-actions .btn{ justify-content:center; width:100%; }
  .det-actions .btn-accent{ flex:none; }
  .det-actions-row{ display:flex; gap:8px; }
  .det-actions-row .btn{ flex:1; min-width:0; width:auto; }

  .set-group{ margin-top:18px; border-top:1px solid var(--border); padding-top:13px; }
  .set-label{ font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--dim); margin-bottom:12px; }
  .set-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; font-size:12px; }
  .set-row .nm{ color:var(--text); display:flex; align-items:center; gap:6px; }
  .set-row .rv{ color:var(--dim); font-variant-numeric:tabular-nums; }

  .switch{
    width:34px; height:18px; background:var(--border); border:1px solid var(--border);
    position:relative; cursor:pointer; padding:0; flex:0 0 auto;
    transition:background .12s, border-color .12s;
  }
  .switch::after{ content:""; position:absolute; top:1px; left:1px; width:14px; height:14px; background:var(--dim); transition:left .15s ease, background .12s; }
  .switch.on{ background:var(--soft); border-color:var(--accent); }
  .switch.on::after{ left:17px; background:var(--accent); }

  .rng{ -webkit-appearance:none; appearance:none; width:130px; height:4px; background:var(--border); border:1px solid var(--border); outline:none; cursor:pointer; }
  .rng::-webkit-slider-thumb{ -webkit-appearance:none; width:11px; height:16px; background:var(--accent); border:0; cursor:pointer; }
  .rng::-moz-range-thumb{ width:11px; height:16px; background:var(--accent); border:0; border-radius:0; cursor:pointer; }

  .seg{ display:inline-flex; border:1px solid var(--border); }
  .segbtn{ background:transparent; border:0; border-right:1px solid var(--border); color:var(--dim); padding:5px 12px; font-size:12px; cursor:pointer; transition:background .1s, color .1s; font-variant-numeric:tabular-nums; }
  .segbtn:last-child{ border-right:0; }
  .segbtn:hover:not(.active){ color:var(--text); }
  .segbtn.active{ background:var(--soft); color:var(--accent); }

  /* custom select — WebKitGTK paints native <select> popup white/unthemed */
  .csel{ position:relative; min-width:110px; }
  .csel-btn{
    width:100%; display:flex; align-items:center; justify-content:space-between; gap:8px;
    background:var(--bg); border:1px solid var(--border); color:var(--text);
    padding:5px 8px; font-size:12px; cursor:pointer; font-family:inherit;
    transition:border-color .12s, background .12s;
  }
  .csel-btn:hover{ border-color:var(--accent); }
  .csel.open .csel-btn{ border-color:var(--accent); }
  .csel-btn .i{ width:12px; height:12px; flex:0 0 auto; opacity:.7; transition:transform .15s; }
  .csel.open .csel-btn .i{ transform:rotate(180deg); opacity:1; color:var(--accent); }
  .csel-val{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:left; }
  .csel-menu{
    position:absolute; right:0; top:calc(100% + 4px); z-index:40;
    min-width:100%; background:var(--surface); border:1px solid var(--border);
    box-shadow:0 8px 24px rgba(0,0,0,.45); padding:2px 0;
    display:none; max-height:220px; overflow-y:auto;
  }
  .csel.open .csel-menu{ display:block; }
  .csel-opt{
    display:block; width:100%; text-align:left; border:0; background:transparent;
    color:var(--text); font-size:12px; padding:7px 10px; cursor:pointer; font-family:inherit;
  }
  .csel-opt:hover{ background:var(--soft); color:var(--accent); }
  .csel-opt.active{ color:var(--accent); background:var(--soft); }
  .set-row.disabled .csel{ pointer-events:none; opacity:.9; }
  /* keep .sel as alias for closed look if any leftover */
  .sel{ background:var(--bg); border:1px solid var(--border); color:var(--text); padding:5px 8px; font-size:12px; cursor:pointer; appearance:none; -webkit-appearance:none; }

  .det-tags{ display:flex; flex-wrap:wrap; gap:6px; }
  .det-tags .badge{ font-size:11px; padding:2px 8px; }

  .det-empty{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--dim); text-align:center; padding:30px; }
  .det-empty .ic{ width:48px; height:48px; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; color:var(--dim); }
  .det-empty-t{ font-size:14px; color:var(--text); }
  .det-empty-s{ font-size:12px; max-width:200px; line-height:1.5; }

  @media (max-width:980px){
    .detail{ position:absolute; right:0; top:0; bottom:0; z-index:5; box-shadow:none; }
    .search{ width:180px; }
    .menu{ display:none; }
  }

  /* list view */
  .grid.list{ grid-template-columns:1fr; gap:8px; }
  .grid.list .card{ flex-direction:row; align-items:stretch; }
  .grid.list .preview{ width:160px; flex:0 0 160px; aspect-ratio:auto; min-height:90px; }
  .grid.list .card-body{ flex:1; display:flex; flex-direction:column; justify-content:center; }

  /* unsupported settings: keep in DOM, visually inert */
  .set-row.disabled{ opacity:.42; pointer-events:none; cursor:not-allowed; }
  .set-row .todo{ margin-left:6px; font-size:10px; color:var(--dim); letter-spacing:.04em; text-transform:uppercase; }
  .set-row.disabled .switch, .set-row.disabled .rng, .set-row.disabled .sel, .set-row.disabled .csel, .set-row.disabled .segbtn{
    cursor:not-allowed;
  }
  .btn:disabled{ opacity:.5; cursor:default; pointer-events:none; }
  .status-line{ font-size:11px; color:var(--dim); margin-top:8px; min-height:16px; }
  .status-line.ok{ color:#86efac; }
  .status-line.err{ color:#fca5a5; }
  .badge-new{ position:absolute; top:6px; right:28px; background:var(--accent); color:#121214; font-size:9px; font-weight:700; padding:1px 5px; letter-spacing:.04em; }
  .card.active-run{ box-shadow: inset 0 0 0 1px var(--accent); }

  /* workshop card badges — subscribed / downloading status from Steam */
  .card .ws-badge{
    position:absolute; top:6px; right:28px;
    display:inline-flex; align-items:center; gap:4px;
    font-size:9px; padding:1px 5px; letter-spacing:.04em; font-weight:600;
    background:var(--accent); color:#121214;
  }
  .card .ws-badge.subscribed{ background:var(--accent); }
  .card .ws-badge.installed{ background:#3a7d44; color:#fff; }
  .card .ws-badge.downloading{ background:#2563eb; color:#fff; }
  .card .ws-progress{
    position:absolute; left:0; bottom:0; height:3px; background:var(--accent);
    transition:width .2s ease; width:0;
  }

  /* library favorites — small star, app-style (surface/border/accent) */
  .fav-btn{
    position:absolute; bottom:6px; right:6px; z-index:2;
    width:22px; height:22px; padding:0;
    display:flex; align-items:center; justify-content:center;
    background:rgba(18,18,20,.82); border:1px solid var(--border);
    color:var(--dim); cursor:pointer;
    transition:color .12s, border-color .12s, background .12s;
  }
  .fav-btn:hover{ color:var(--accent); border-color:var(--accent); background:var(--soft); }
  .fav-btn.on{ color:var(--accent); border-color:var(--accent); }
  .fav-btn.on .i{ fill:var(--accent); stroke:var(--accent); }
  .fav-btn .i{ width:12px; height:12px; }
  .card.favorited{ border-color:#5a3a20; }
  .card.favorited:hover, .card.favorited.selected{ border-color:var(--accent); }
  .det-fav{
    width:28px; height:28px; flex:0 0 auto; padding:0;
    display:inline-flex; align-items:center; justify-content:center;
    background:transparent; border:1px solid var(--border); color:var(--dim); cursor:pointer;
    transition:color .12s, border-color .12s, background .12s;
  }
  .det-fav:hover{ color:var(--accent); border-color:var(--accent); background:var(--soft); }
  .det-fav.on{ color:var(--accent); border-color:var(--accent); background:var(--soft); }
  .det-fav.on .i{ fill:var(--accent); stroke:var(--accent); }
  .det-title-row{ display:flex; align-items:flex-start; gap:8px; }
  .det-title-row .det-title{ flex:1; min-width:0; }

  /* toast */
  .toast-stack{ position:fixed; bottom:16px; left:50%; transform:translateX(-50%); z-index:100; display:flex; flex-direction:column; gap:6px; pointer-events:none; }
  .toast{
    background:var(--surface); color:var(--text); border:1px solid var(--border);
    padding:9px 14px; font-size:12px;
    display:flex; align-items:center; gap:8px;
    pointer-events:auto; min-width:200px; max-width:420px;
    opacity:0; transform:translateY(8px);
    transition:opacity .18s ease, transform .18s ease;
  }
  .toast.show{ opacity:1; transform:translateY(0); }
  .toast.err{ border-color:#ef4444; color:#fca5a5; }
  .toast.ok{ border-color:var(--accent); }
  .toast .i{ width:14px; height:14px; flex:0 0 auto; }

</style>
</head>

<script>
/* Icons */
const P = {
  menu:'<line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>',

  check:'<polyline points="20,6 9,17 4,12"/>',

  chevR:'<polyline points="9,18 15,12 9,6"/>',
  image:'<rect x="3" y="3" width="18" height="18"/><circle cx="8.5" cy="8.5" r="1.4"/><polyline points="21,15 16,10 5,21"/>',
  x:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',

  panel:'<rect x="3" y="4" width="18" height="16"/><line x1="9" y1="4" x2="9" y2="20"/>',
  panelR:'<rect x="3" y="4" width="18" height="16"/><line x1="15" y1="4" x2="15" y2="20"/>',
  info:'<circle cx="12" cy="12" r="9"/><line x1="12" y1="11" x2="12" y2="16"/><line x1="12" y1="8" x2="12.01" y2="8"/>',

};
function svg(name, cls){ return '<svg class="i '+(cls||'')+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(P[name]||'')+'</svg>'; }
function typeIcon(t){ return t==='scene'?svg('layers','i-sm'):t==='video'?svg('play','i-sm'):svg('globe','i-sm'); }

const ICON_TOKENS = {
  __IC_REFRESH__:svg('refresh'), __IC_SLIDERS__:svg('sliders'), __IC_INFO__:svg('info'),
  __IC_PANEL__:svg('panel'), __IC_SEARCH__:svg('search','i-sm'), __IC_LAYERS__:svg('layers','i-sm'),
  __IC_TAG__:svg('tag','i-sm'), __IC_CHEVR__:svg('chevR'), __IC_GRID__:svg('grid','i-sm'),
  __IC_LIST__:svg('list','i-sm'), __IC_PANELR__:svg('panelR'), __IC_CHEVL__:svg('chevL'),
  __IC_X__:svg('x'), __IC_MIN__:svg('min'), __IC_MAX__:svg('max')
};
/* icons pre-baked into HTML; svg() still used for dynamic card/type icons */

/* ============================================================
   Real backend (Tauri invoke — Rust index/engine inside the app)
   ============================================================ */
/* Tauri 2 backend via invoke (withGlobalTauri) */
function tauriApi(){
  return window.__TAURI__ || window.__TAURI_INTERNALS__ || {};
}
function getInvoke(){
  const a = tauriApi();
  // Tauri 2 global shapes
  if(a.core && typeof a.core.invoke === 'function') return a.core.invoke.bind(a.core);
  if(typeof a.invoke === 'function') return a.invoke.bind(a);
  if(window.__TAURI_INTERNALS__ && typeof window.__TAURI_INTERNALS__.invoke === 'function'){
    return window.__TAURI_INTERNALS__.invoke.bind(window.__TAURI_INTERNALS__);
  }
  return null;
}
async function invoke(cmd, args){
  const fn = getInvoke();
  if(!fn) throw new Error('Tauri invoke unavailable keys='+Object.keys(tauriApi()).join(','));
  if(args === undefined) return fn(cmd);
  return fn(cmd, args);
}
function convertFileSrc(path){
  if(!path) return '';
  try{
    const a = tauriApi();
    if(a.core && a.core.convertFileSrc) return a.core.convertFileSrc(path);
    if(a.convertFileSrc) return a.convertFileSrc(path);
  }catch(_){}
  // asset protocol fallback used by Tauri 2 on Linux
  try{
    const base = window.__TAURI_INTERNALS__?.convertFileSrc
      || window.__TAURI__?.core?.convertFileSrc;
    if(base) return base(path);
  }catch(_){}
  return 'https://asset.localhost' + path;
}

/**
 * Playback settings classification (linux-wallpaperengine --help):
 * REAL: volume/silent, fps, scaling, pauseFullscreen, allowInput, noautomute
 * STUB: autoplay, quality, pauseOnBattery
 */
const DEFAULT_SETTINGS = {
  volume: 15,
  fps: 30,
  silent: false,
  scaling: 'fill',
  pauseFullscreen: true,
  allowInput: true,
  noautomute: false
};

const state = {
  type: 'all',
  tags: new Set(),
  term: '',
  selectedId: null,
  view: 'grid',
  items: [],
  newIds: new Set(),
  currentId: null,
  settings: { ...DEFAULT_SETTINGS },
  scanning: false,
  // Workshop tab state — separate data source, reuse same grid/detail UI
  tab: 'library',           // 'library' | 'workshop'
  steamOn: false,           // Steam Mode toggle
  wsItems: [],              // WorkshopItem[] from Steam UGC query
  wsLoading: false,
  wsTotal: 0,
  wsPage: 1,
  wsSelectedId: null,       // separate selection per tab
  wsCurrentId: null,        // currently launched wallpaper id (shared with library)
  wsProgress: {},            // id -> {current,total,done,state}
  wsInstalled: {},           // id -> folder path (post-install)
  favorites: new Set(),      // library wallpaper ids (persisted in localStorage)
  // Wallpaper-specific properties (project.json general.properties)
  wpProps: [],               // PropDef[] for selected wallpaper
  wpPropValues: {},          // key -> current value
  wpPropsId: null,           // id the defs belong to
};

const FAV_KEY = 'lwe.favorites';
function loadFavorites(){
  try{
    const raw = localStorage.getItem(FAV_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return new Set((Array.isArray(arr) ? arr : []).map(String));
  }catch(_){ return new Set(); }
}
function saveFavorites(){
  try{ localStorage.setItem(FAV_KEY, JSON.stringify([...state.favorites])); }catch(_){}
}
function isFavorite(id){ return state.favorites.has(String(id)); }
function toggleFavorite(id){
  if(id==null || id==='') return false;
  const k = String(id);
  if(state.favorites.has(k)) state.favorites.delete(k);
  else state.favorites.add(k);
  saveFavorites();
  return state.favorites.has(k);
}
state.favorites = loadFavorites();

function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}
function fileUrl(p){
  return convertFileSrc(p);
}

/* ---------- API (Tauri invoke — no Python/HTTP from the desktop UI) ---------- */
function settingsPayload(s){
  const o = s || state.settings;
  return {
    volume: o.silent ? 0 : o.volume,
    fps: o.fps,
    silent: !!(o.silent || o.volume===0),
    scaling: o.scaling || 'fill',
    no_fullscreen_pause: o.pauseFullscreen ? false : true,
    disable_mouse: o.allowInput ? false : true,
    noautomute: !!o.noautomute
  };
}

function mapServerSettings(s){
  if(!s) return { ...DEFAULT_SETTINGS };
  return {
    volume: Number(s.volume ?? 15),
    fps: Number(s.fps ?? 30),
    silent: !!s.silent,
    scaling: s.scaling || 'fill',
    pauseFullscreen: !s.no_fullscreen_pause,
    allowInput: !s.disable_mouse,
    noautomute: !!s.noautomute
  };
}

/* Toast helper */
function toast(msg, kind){
  const stack = $('toastStack'); if(!stack) return;
  const el = document.createElement('div');
  el.className = 'toast' + (kind?(' '+kind):'');
  const ic = kind==='err' ? svg('x','i-sm') : kind==='ok' ? svg('check','i-sm') : svg('info','i-sm');
  el.innerHTML = ic + '<span>'+esc(msg)+'</span>';
  stack.appendChild(el);
  requestAnimationFrame(()=> el.classList.add('show'));
  setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=>el.remove(), 250); }, 3200);
}


/* ---------- Sidebar ---------- */
function renderSidebar(){
  const items = curItems();
  const types = state.tab==='workshop'
    ? [['all','All'],['scene','Scene'],['video','Video'],['web','Web'],['collection','Collections'],['art','Art']]
    : [['all','All'],['scene','Scene'],['video','Video'],['web','Web']];
  typeList.innerHTML = types.map(([k,l])=>{
    const cnt = k==='all' ? items.length : items.filter(w=>w.type===k).length;
    return '<div class="fitem type-item '+(state.type===k?'active':'')+'" data-type="'+k+'">'
         + typeIcon(k==='all'?'scene':k) + '<span class="fname">'+l+'</span><span class="fcount">'+cnt+'</span></div>';
  }).join('');

  // Tags for workshop come from `QueryResult.tags` (real author tags from Steam UGC API),
  // no Library heuristics.
  const tagCounts = {};
  items.forEach(w=>(w.tags||[]).forEach(t=>tagCounts[t]=(tagCounts[t]||0)+1));
  tagList.innerHTML = Object.keys(tagCounts).sort((a,b)=>a.localeCompare(b)).map(t=>{
    return '<label class="fitem tag-item '+(state.tags.has(t)?'active':'')+'">'
         + '<input type="checkbox" class="chk" data-tag="'+esc(t)+'" '+(state.tags.has(t)?'checked':'')+'>'
         + '<span class="fname">'+esc(t)+'</span><span class="fcount">'+tagCounts[t]+'</span></label>';
  }).join('');
}

/* ---------- Grid ---------- */
function cardHTML(w){
  const tagsArr = w.tags || [];
  const shown = tagsArr.slice(0,3);
  const tags = shown.map(t=>'<span class="badge">'+esc(t)+'</span>').join('')
             + (tagsArr.length>3 ? '<span class="badge">+'+(tagsArr.length-3)+'</span>' : '');
  // Library: prefer static thumb (~20–40KB JPEG) over workshop preview (0.5–1MB JPG/GIF).
  // Workshop: thumb === preview URL (CDN), directly load via <img src> (no asset://).
  const gridSrc = w.thumb || w.preview;
  const srcAttr = state.tab==='workshop'
    ? 'src="'+esc(gridSrc)+'"'
    : 'data-src="'+fileUrl(gridSrc)+'" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="';
  const img = gridSrc
    ? '<img class="thumb" alt="'+esc(w.title)+'" decoding="async" loading="lazy" '+srcAttr+' onerror="this.style.opacity=0">'
    : '';
  const isNew = state.tab==='library' && state.newIds.has(w.id);
  const isRun = state.currentId === w.id;
  // Workshop-only status badges
  let wsBadge = '', wsProg = '';
  if(state.tab==='workshop'){
    const prog = state.wsProgress[w.id];
    if(w.installed){ wsBadge = '<span class="ws-badge installed">INSTALLED</span>'; }
    else if(prog && !prog.done){ wsBadge = '<span class="ws-badge downloading">DL</span>'; }
    else if(w.subscribed){ wsBadge = '<span class="ws-badge subscribed">SUB</span>'; }
    if(prog && !prog.done && prog.total){ const pct = Math.max(0, Math.min(100, Math.round(100*prog.current/prog.total))); wsProg = '<div class="ws-progress" style="width:'+pct+'%"></div>'; }
  }
  const selId = state.tab==='workshop' ? state.wsSelectedId : state.selectedId;
  const fav = state.tab==='library' && isFavorite(w.id);
  const favBtn = state.tab==='library'
    ? '<button type="button" class="fav-btn'+(fav?' on':'')+'" data-fav="'+esc(w.id)+'" title="'+(fav?'Remove from favorites':'Add to favorites')+'" aria-label="Favorite">'+svg('star')+'</button>'
    : '';
  return '<div class="card'+(selId===w.id?' selected':'')+(isRun?' active-run':'')+(fav?' favorited':'')+'" role="button" tabindex="0" data-id="'+esc(w.id)+'">'
    + '<div class="preview">'+img
    + '<span class="type-tag">'+typeIcon(w.type)+esc(w.type)+'</span>'
    + (isNew ? '<span class="badge-new">NEW</span>' : '')
    + wsBadge
    + favBtn
    + '<span class="sel-dot">'+svg('check')+'</span></div>'
    + '<div class="card-body">'
    +   '<div class="card-name" title="'+esc(w.title)+'">'+esc(w.title)+'</div>'
    +   '<div class="card-meta"><span>'+esc(w.type)+'</span><span class="sep">·</span><span>id '+esc(w.id)+'</span>'
    +   (w.size ? '<span class="sep">·</span><span>'+esc(w.size)+'</span>' : '')
    +   '</div>'
    +   '<div class="card-tags">'+tags+'</div>'
    + '</div>'+wsProg+'</div>';
}
function renderGrid(list){
  grid.classList.toggle('list', state.view==='list');
  grid.style.minHeight = '';
  if(!list.length){
    grid.innerHTML = '<div class="grid-empty">'+svg('search','i-lg')
      + '<div>Nothing found for the current filters.</div>'
      + '<button class="link-btn" id="clearAll">Reset filters</button></div>';
    return;
  }
  grid.innerHTML = list.map(cardHTML).join('');
  observeThumbs(grid);
}

function applyFilters(){
  const items = curItems();
  const term = state.term.trim().toLowerCase();
  const list = items.filter(w=>{
    if(state.type!=='all' && w.type!==state.type) return false;
    if(state.tags.size && !(w.tags||[]).some(t=>state.tags.has(t))) return false;
    if(term){
      const hay = (w.title+' '+w.id+' '+(w.tags||[]).join(' ')+' '+(w.description||'')).toLowerCase();
      if(!hay.includes(term)) return false;
    }
    return true;
  });
  // Library favorites first (stable sort keeps relative order within groups)
  if(state.tab==='library' && state.favorites.size){
    list.sort((a,b)=>{
      const af = isFavorite(a.id) ? 0 : 1;
      const bf = isFavorite(b.id) ? 0 : 1;
      return af - bf;
    });
  }
  renderGrid(list);
  const total = state.tab==='workshop' ? (state.wsTotal || items.length) : items.length;
  counter.innerHTML = '<b>'+list.length+'</b> / '+total;
}
function resetFilters(){
  state.type='all'; state.tags.clear(); state.term='';
  searchMain.value=''; searchSide.value='';
  renderSidebar(); applyFilters();
}

  }

    h += setSelect('Quality', ['Low','Medium','High','Ultra'], 'High', 'q', true,
      'TODO: no --quality flag; would need engine patch or --set-property mapping per wallpaper');
    h += setSelect('Scaling', ['fill','fit','stretch','default'], s.scaling, 'scaling', false, null);
    // REAL: maps to --no-fullscreen-pause inverted (engine pauses on fullscreen, not pure focus)
    h += setToggle('Pause when unfocused', s.pauseFullscreen, 'pause', false, null);
  } else {
    // TODO: Pause on battery — no engine flag.
    h += setToggle('Pause on battery', true, 'pb', true,

    h += setSelect('Scaling', ['fill','fit','stretch','default'], s.scaling, 'scaling', false, null);
  }
  return h;
}


/** Color "r g b" (0..1 floats) → #rrggbb for <input type=color>. */
function colorToHex(val){
  let r=1,g=1,b=1;
  if(typeof val === 'string'){
    const parts = val.trim().split(/[\s,]+/).map(Number);
    if(parts.length >= 3 && parts.every(n => !Number.isNaN(n))){
      r=parts[0]; g=parts[1]; b=parts[2];
    }
  }
  const clamp = x => Math.max(0, Math.min(255, Math.round((x > 1 ? x : x*255))));
  const h = n => clamp(n).toString(16).padStart(2,'0');
  return '#'+h(r)+h(g)+h(b);
}
function hexToColor(hex){
  const m = /^#?([0-9a-f]{6})$/i.exec(String(hex||'').trim());
  if(!m) return '1 1 1';
  const n = parseInt(m[1], 16);
  const r = ((n>>16)&255)/255, g=((n>>8)&255)/255, b=(n&255)/255;
  return r+' '+g+' '+b;
}

function wallpaperPropsHTML(){
  const props = (state.wpProps || []).filter(p => !p.hidden && p.type !== 'text' && p.type !== 'group');
  if(!props.length){
    return '<div class="det-empty-s" style="padding:4px 0">No customizable options for this wallpaper.</div>';
  }
  let h = '';
  for(const p of props){
    const key = p.key;
    const label = p.text || key;
    let cur = state.wpPropValues[key];
    if(cur === undefined) cur = p.value;
    if(p.type === 'bool'){
      const on = cur === true || cur === 1 || cur === '1' || cur === 'true';
      h += '<div class="set-row"><span class="nm">'+esc(label)+'</span>'
        + '<button type="button" class="switch '+(on?'on':'')+'" data-wp="'+esc(key)+'" data-wptype="bool"></button></div>';
    } else if(p.type === 'slider'){
      const min = (p.min != null) ? p.min : 0;
      const max = (p.max != null) ? p.max : 100;
      const step = (p.step != null && p.step > 0) ? p.step : ((max-min) <= 1 ? 0.01 : 1);
      const val = (cur == null || cur === '') ? min : Number(cur);
      h += '<div class="set-row"><span class="nm">'+esc(label)
        + ' <span class="rv" data-wprv="'+esc(key)+'">'+val+'</span></span>'
        + '<input type="range" class="rng" data-wprng="'+esc(key)+'" min="'+min+'" max="'+max+'" step="'+step+'" value="'+val+'"></div>';
    } else if(p.type === 'combo'){
      const opts = (p.options || []);
      const curS = String(cur == null ? ((opts[0]&&opts[0].value)||'') : cur);
      const labels = {};
      opts.forEach(o => { labels[String(o.value)] = o.label || o.value; });
      const arrow = '<svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6,9 12,15 18,9"/></svg>';
      h += '<div class="set-row"><span class="nm">'+esc(label)+'</span>'
        + '<div class="csel" data-wpsel="'+esc(key)+'" data-value="'+esc(curS)+'">'
        +   '<button type="button" class="csel-btn" aria-haspopup="listbox">'
        +     '<span class="csel-val">'+esc(labels[curS] || curS)+'</span>'+arrow
        +   '</button>'
        +   '<div class="csel-menu" role="listbox">'
        +     opts.map(o =>
              '<button type="button" role="option" class="csel-opt'+(String(o.value)===curS?' active':'')+'" data-v="'+esc(String(o.value))+'" data-label="'+esc(o.label||o.value)+'">'+esc(o.label||o.value)+'</button>'
            ).join('')
        +   '</div></div></div>';
    } else if(p.type === 'color'){
      const hex = colorToHex(cur);
      h += '<div class="set-row"><span class="nm">'+esc(label)+'</span>'
        + '<input type="color" class="wp-color" data-wpcolor="'+esc(key)+'" value="'+hex+'" style="width:42px;height:28px;border:1px solid var(--border);background:transparent;padding:0;cursor:pointer;border-radius:6px"></div>';
    } else if(p.type === 'textinput' || p.type === 'file' || p.type === 'scenetexture'){
      const s = (cur == null) ? '' : String(cur);
      h += '<div class="set-row"><span class="nm">'+esc(label)+'</span>'
        + '<input type="text" class="wp-text" data-wptext="'+esc(key)+'" value="'+esc(s)+'" style="width:55%;background:var(--panel2,#1a1a1f);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 8px;font-size:12px"></div>';
    }
  }
  return h;
}

async function loadWallpaperProps(id){
  if(!id){
    state.wpProps = [];
    state.wpPropValues = {};
    state.wpPropsId = null;
    return;
  }
  try{
    const j = await apiGetProps(String(id));
    const list = (j && j.properties) ? j.properties : [];
    state.wpProps = list;
    state.wpPropValues = {};
    for(const p of list){
      state.wpPropValues[p.key] = p.value;
    }
    state.wpPropsId = String(id);
  }catch(e){
    state.wpProps = [];
    state.wpPropValues = {};
    state.wpPropsId = String(id);
  }
}

function readPanelWpProps(){
  const out = { ...state.wpPropValues };
  detailInner.querySelectorAll('.switch[data-wp]').forEach(sw => {
    out[sw.dataset.wp] = sw.classList.contains('on');
  });
  detailInner.querySelectorAll('.rng[data-wprng]').forEach(r => {
    const v = Number(r.value);
    out[r.dataset.wprng] = Number.isFinite(v) ? v : r.value;
  });
  detailInner.querySelectorAll('.csel[data-wpsel]').forEach(box => {
    out[box.dataset.wpsel] = box.dataset.value;
  });
  detailInner.querySelectorAll('.wp-color[data-wpcolor]').forEach(inp => {
    out[inp.dataset.wpcolor] = hexToColor(inp.value);
  });
  detailInner.querySelectorAll('.wp-text[data-wptext]').forEach(inp => {
    out[inp.dataset.wptext] = inp.value;
  });
  state.wpPropValues = out;
  return out;
}

    const unsubBtn = state.steamOn
      ? '<button class="btn magnetic" id="btnUnsub" data-id="'+esc(w.id)+'" title="Unsubscribe via Steam">'+svg('x','i-sm')+'Unsubscribe</button>'
      : '';

            + '<div class="det-actions-row">'+openBtn+unsubBtn+'</div>';

  const favBtn = state.tab==='library'

    : '';

function findItem(id){ return findCurItem(id); }

function markActiveRun(id){
  grid.querySelectorAll('.card.active-run').forEach(c=>c.classList.remove('active-run'));
  if(id!=null){
    const c = grid.querySelector('.card[data-id="'+CSS.escape(String(id))+'"]');
    if(c) c.classList.add('active-run');
  }
}
function selectWallpaper(id){
  curSetSelectedId(id);
  grid.querySelectorAll('.card.selected').forEach(c=>c.classList.remove('selected'));
  if(id!=null){
    const c = grid.querySelector('.card[data-id="'+CSS.escape(String(id))+'"]');
    if(c) c.classList.add('selected');
    // Load project.json properties then paint detail (async).
    const item = findCurItem(id);
    renderDetail(item); // immediate shell
    if(state.tab==='library'){
      loadWallpaperProps(id).then(()=>{
        if(String(curSelectedId())===String(id)) renderDetail(findCurItem(id));
      });
    } else {
      state.wpProps = []; state.wpPropValues = {}; state.wpPropsId = null;
    }
  } else {
    state.wpProps = []; state.wpPropValues = {}; state.wpPropsId = null;
    renderDetail(null);
  }
}

function setStatus(msg, kind){
  const el = detailInner.querySelector('#detStatus');
  if(!el) return;
  el.textContent = msg || '';
  el.className = 'status-line' + (kind?(' '+kind):'');
}

async function applyWallpaper(id){
  if(!id) return;
  setStatus('launching…');
  const btn = detailInner.querySelector('#btnApply');
  if(btn) btn.disabled = true;
  try{
    const props = (state.tab==='library') ? readPanelWpProps() : {};
    const payload = Object.assign({}, settingsPayload(), { properties: props });
    const j = await apiLaunch(id, payload);
    if(j.ok){
      state.currentId = id;
      if(j.opts) state.settings = mapServerSettings(j.opts);
      setStatus('running · fps '+state.settings.fps+' · vol '+(state.settings.silent?0:state.settings.volume), 'ok');
      markActiveRun(id);
    } else {
      setStatus('err: '+(j.error||'failed'), 'err');
    }
  } catch(e){
    setStatus('daemon offline', 'err');
  } finally {
    if(btn) btn.disabled = false;
  }
}

async function openFolder(id){
  try{
    const j = await apiOpen(id);
    if(!j.ok) setStatus('open failed: '+(j.error||''), 'err');
  } catch(e){
    setStatus('daemon offline', 'err');
  }
}

async function stopWallpaper(){
  try{
    await apiStop();
    state.currentId = null;
    markActiveRun(null);
    setStatus('stopped');
  } catch(e){ setStatus('daemon offline', 'err'); }
}

/* ---------- Workshop tab / Steam Mode ---------- */
const tabLibrary = $('tabLibrary'), tabWorkshop = $('tabWorkshop');
const steamToggle = $('steamToggle'), steamToggleWrap = $('steamToggleWrap');

function setTab(tab){
  if(tab==='workshop' && !state.steamOn) return;  // blocked unless Steam Mode on
  state.tab = tab;
  // Reset filters + selection for the new data source
  state.type = 'all'; state.tags.clear(); state.term = '';
  searchMain.value = ''; searchSide.value = '';
  // Avoid leftover scroll hiding Type/search under a long tag list
  const sc = document.querySelector('.side-scroll'); if(sc) sc.scrollTop = 0;
  tabLibrary.classList.toggle('active', tab==='library');
  tabWorkshop.classList.toggle('active', tab==='workshop');
  // Placeholder for search
  if(searchSide) searchSide.placeholder = tab==='workshop' ? 'Search Workshop…' : 'Search library…';
  if(searchMain) searchMain.placeholder = tab==='workshop' ? 'Search Workshop…' : 'Search by name, tag or id…';
  renderSidebar(); applyFilters();
  // Reselect current if any
  const items = curItems();
  const sel = curSelectedId();
  if(sel && items.find(w=>w.id===sel)) selectWallpaper(sel);
  else if(items[0]) selectWallpaper(items[0].id);
  else renderDetail(null);
  // For workshop, run query if empty
  if(tab==='workshop' && state.wsItems.length===0 && !state.wsLoading){
    runWorkshopQuery();
  }
}

async function toggleSteamMode(on){
  if(on && state.steamOn) return;
  if(!on && !state.steamOn) return;
  if(on){
    steamToggle.classList.add('on');
    try{
      const j = await apiSteamModeOn();
      if(j.ok){
        state.steamOn = true;
        steamToggle.classList.add('on');
        tabWorkshop.classList.remove('disabled');
        toast('Steam Mode on', 'ok');
        setTab('workshop');  // auto-switch to Workshop tab+
      } else {
        state.steamOn = false;
        steamToggle.classList.remove('on');
        tabWorkshop.classList.add('disabled');
        toast('Steam not found — start the Steam client', 'err');
      }
    } catch(e){
      state.steamOn = false;
      steamToggle.classList.remove('on');
      tabWorkshop.classList.add('disabled');
      toast('Steam not found — start the Steam client', 'err');
    }
  } else {
    try{ await apiSteamModeOff(); }catch(_){}
    state.steamOn = false;
    steamToggle.classList.remove('on');
    tabWorkshop.classList.add('disabled');
    state.wsItems = []; state.wsSelectedId = null; state.wsProgress = {}; state.wsInstalled = {};
    if(state.tab==='workshop') setTab('library');
    else if(state.tab==='library' && state.selectedId) renderDetail(findCurItem(state.selectedId));
    toast('Steam Mode off');
  }
}

steamToggleWrap.addEventListener('click', e=>{
  e.stopPropagation();
  const on = !steamToggle.classList.contains('on');
  steamToggle.classList.toggle('on', on);
  steamToggle.setAttribute('aria-checked', on ? 'true' : 'false');
  toggleSteamMode(on);
});
steamToggle.addEventListener('keydown', e=>{
  if(e.key==='Enter' || e.key===' '){
    e.preventDefault(); e.stopPropagation();
    steamToggleWrap.click();
  }
});

tabLibrary.addEventListener('click', e=>{
  // ignore clicks on the Steam toggle area (tabWorkshop owns it)
  if(e.target.closest('.steam-toggle-wrap')) return;
  setTab('library');
});
tabWorkshop.addEventListener('click', e=>{
  if(e.target.closest('.steam-toggle-wrap')) return;
  if(tabWorkshop.classList.contains('disabled')) return;
  setTab('workshop');
});

/* ---------- Workshop query / subscribe flow ---------- */
let _wsScanTimer = 0;
function clearWsScanTimer(){ if(_wsScanTimer){ clearInterval(_wsScanTimer); _wsScanTimer = 0; } }

async function runWorkshopQuery(opts){
  if(state.wsLoading) return;
  state.wsLoading = true;
  clearWsScanTimer();
  const scan = $('scan'), scanBar = $('scanBar'), scanFile = $('scanFile');
  scan.style.display = 'flex'; scan.classList.add('is-on');
  scanBar.style.width = '15%'; scanFile.textContent = 'querying Steam Workshop…';
  let p = 15;
  _wsScanTimer = setInterval(()=>{ p = Math.min(90, p+4); scanBar.style.width = p+'%'; }, 200);
  try{
    const args = {
      page: state.wsPage || 1,
      searchText: opts?.searchText ?? (state.term || undefined),
      requiredTags: opts?.requiredTags ?? (state.tags.size ? [...state.tags] : undefined),
      excludedTags: opts?.excludedTags
    };
    const j = await apiWorkshopQuery(args);
    if(!j.ok) throw new Error(j.error||'query failed');
    scanFile.textContent = 'workshop query sent — awaiting Steam response…';
  } catch(e){
    clearWsScanTimer();
    scanBar.style.width = '100%';
    scanFile.textContent = 'workshop query failed: '+e.message;
    setTimeout(()=>{ scan.style.display='none'; scan.classList.remove('is-on'); scanBar.style.width='0%'; state.wsLoading=false; }, 1800);
  }
  // results arrive via 'workshop-query-results' event listener
}

async function workshopSubscribe(id){
  if(!id) return;
  setStatus('subscribing…');
  try{
    const j = await apiWorkshopSubscribe(id);
    if(!j.ok) setStatus('err: '+(j.error||'failed'), 'err');
    else {
      setStatus('subscribed — downloading…');
      const w = state.wsItems.find(x=>x.id===id);
      if(w) w.subscribed = true;
      applyFilters();
      if(curSelectedId()===id) renderDetail(findCurItem(id));
    }
  } catch(e){ setStatus('err: '+e.message, 'err'); }
}

async function workshopUnsubscribe(id){
  if(!id) return;
  setStatus('unsubscribing…');
  try{
    const j = await apiWorkshopUnsubscribe(id);
    if(j.ok){
      setStatus(j.disk_deleted ? 'unsubscribed · deleted local files' : 'unsubscribed', 'ok');
      const w = state.wsItems.find(x=>String(x.id)===String(id));
      if(w){ w.subscribed=false; w.installed=false; w.dir=''; }
      // Backend purged Steam sub + disk folder + index cache; sync frontend
      state.items = state.items.filter(x=>String(x.id)!==String(id));
      state.favorites.delete(String(id));
      saveFavorites();
      if(String(state.currentId)===String(id)){
        state.currentId = null;
        try{ await apiStop(); }catch(_){}
      }
      if(String(state.selectedId)===String(id)) state.selectedId = null;
      if(String(state.wsSelectedId)===String(id)) state.wsSelectedId = null;
      renderSidebar();
      applyFilters();
      if(state.tab==='workshop'){
        renderDetail(findCurItem(id));
      } else {
        const next = state.selectedId || (state.items[0] && state.items[0].id) || null;
        if(next) selectWallpaper(next);
        else renderDetail(null);
      }
      const bits = ['Unsubscribed'];
      if(j.disk_deleted) bits.push('files deleted');
      else bits.push('no local folder');
      toast(bits.join(' · '), 'ok');
    }
    else setStatus('err: '+(j.error||'failed'), 'err');
  } catch(e){ setStatus('err: '+e.message, 'err'); }
}

/* Workshop event listeners — call after Tauri API is ready (see init). */
function listenWorkshop(){
  const a = tauriApi();
  const listen = a.event && a.event.listen;
  if(typeof listen !== 'function'){
    console.warn('workshop: event.listen unavailable');
    return false;
  }
  listen('workshop-query-results', ev=>{
    const payload = ev.payload || {};
    clearWsScanTimer();
    state.wsLoading = false;
    const scan = $('scan'), scanBar = $('scanBar'), scanFile = $('scanFile');
    if(payload.ok){
      state.wsItems = payload.items || [];
      state.wsTotal = payload.total || state.wsItems.length;
      scanBar.style.width = '100%';
      scanFile.textContent = 'workshop: ' + state.wsItems.length + ' / ' + state.wsTotal + ' items';
      if(state.tab==='workshop'){
        renderSidebar(); applyFilters();
        if(state.wsSelectedId){
          const still = findCurItem(state.wsSelectedId);
          if(still) renderDetail(still); else selectWallpaper(null);
        } else if(state.wsItems[0]) selectWallpaper(state.wsItems[0].id);
      }
    } else {
      scanBar.style.width = '100%';
      scanFile.textContent = 'workshop query error: '+(payload.error||'');
      toast('Workshop query: '+(payload.error||'failed'), 'err');
    }
    setTimeout(()=>{ scan.style.display='none'; scan.classList.remove('is-on'); scanBar.style.width='0%'; }, 1200);
  });
  listen('workshop-download-progress', ev=>{
    const p = ev.payload || {};
    state.wsProgress[p.id] = { current: p.current||0, total: p.total||0, done: !!p.done, state: p.state, error: p.error };
    if(!p.done && p.total){
      const card = grid.querySelector('.card[data-id="'+CSS.escape(String(p.id))+'"]');
      if(card){
        let bar = card.querySelector('.ws-progress');
        if(!bar){ bar = document.createElement('div'); bar.className='ws-progress'; card.appendChild(bar); }
        bar.style.width = Math.max(0, Math.min(100, Math.round(100*p.current/p.total))) + '%';
      }
    }
    if(curSelectedId()===p.id){
      if(p.error) setStatus('err: '+p.error, 'err');
      else if(!p.done && p.total) setStatus('downloading… '+(p.current||0)+' / '+(p.total||0)+' bytes');
      else if(!p.done) setStatus('subscribed — download starting…');
      else if(p.done) setStatus('installed', 'ok');
    }
  });
  listen('workshop-item-installed', ev=>{
    const p = ev.payload || {};
    state.wsInstalled[p.id] = p.folder;
    delete state.wsProgress[p.id];
    const it = state.wsItems.find(x=>x.id===p.id);
    if(it){ it.installed = true; it.subscribed = true; it.dir = p.folder; }
    if(state.tab==='workshop'){
      applyFilters();
      if(curSelectedId()===p.id) renderDetail(findCurItem(p.id));
    }
    toast('Wallpaper ' + p.id + ' installed', 'ok');
  });
  listen('workshop-mode-changed', ev=>{
    const p = ev.payload || {};
    state.steamOn = !!p.on;
    steamToggle.classList.toggle('on', state.steamOn);
    steamToggle.setAttribute('aria-checked', state.steamOn ? 'true' : 'false');
    tabWorkshop.classList.toggle('disabled', !state.steamOn);
    if(!state.steamOn && state.tab==='workshop') setTab('library');
    // Refresh Library detail so Unsubscribe button appears/disappears with Steam Mode
    else if(state.tab==='library' && state.selectedId) renderDetail(findCurItem(state.selectedId));
  });
  return true;
}

/* ---------- Rescan (real) ---------- */
async function runScan(){
  if(state.scanning) return;
  state.scanning = true;
  const scan = $('scan'), scanBar = $('scanBar'), scanFile = $('scanFile');
  scan.style.display = 'flex';
  scan.classList.add('is-on');
  scanBar.style.width = '15%';
  scanFile.textContent = 'scanning workshop…';
  // fake progress while waiting
  let p = 15;
  const t = setInterval(()=>{ p = Math.min(90, p+4); scanBar.style.width = p+'%'; }, 200);
  try{
    const j = await apiRescan();
    clearInterval(t);
    if(!j.ok) throw new Error(j.error||'rescan failed');
    state.items = j.items || [];
    state.newIds = new Set(j.added || []);
    scanBar.style.width = '100%';
    const parts = [];
    if(j.added?.length) parts.push('+'+j.added.length+' new');
    if(j.removed?.length) parts.push('-'+j.removed.length);
    if(j.updated?.length) parts.push('~'+j.updated.length);
    scanFile.textContent = 'scan complete · '+(j.count||state.items.length)
      + (parts.length?(' · '+parts.join(', ')):'');
    renderSidebar();
    applyFilters();
    if(state.selectedId){
      const still = findItem(state.selectedId);
      if(still) renderDetail(still); else selectWallpaper(null);
    }
  } catch(e){
    clearInterval(t);
    scanBar.style.width = '100%';
    scanFile.textContent = 'scan failed · ' + e.message;
  } finally {
    setTimeout(()=>{
      scan.style.display='none';
      scan.classList.remove('is-on');
      scanBar.style.width='0%';
      state.scanning = false;
    }, 1800);
  }
}

/* ---------- Settings interactions ---------- */
function readPanelSettings(){
  const s = { ...state.settings };
  const vol = detailInner.querySelector('.rng[data-rng="vol"]');
  if(vol){ s.volume = +vol.value; s.silent = s.volume===0; }
  const fpsBtn = detailInner.querySelector('.segbtn[data-seg="fps"].active');
  if(fpsBtn) s.fps = +fpsBtn.dataset.v;
  const sc = detailInner.querySelector('.csel[data-sel="scaling"]');
  if(sc){ const lab=sc.querySelector('.csel-val'); s.scaling = sc.dataset.value || (lab && lab.textContent) || s.scaling; }
  const pause = detailInner.querySelector('.switch[data-sw="pause"]');
  if(pause) s.pauseFullscreen = pause.classList.contains('on');
  const allow = detailInner.querySelector('.switch[data-sw="in"]');
  if(allow) s.allowInput = allow.classList.contains('on');
  return s;
}

detailInner.addEventListener('click', e=>{

  if(e.target.closest('#btnFav')){
    const id = e.target.closest('#btnFav').dataset.id;

    const id = sw.dataset.sw;

detailInner.addEventListener('input', e=>{

/* window controls (decorations:false) */
(function(){
  function win(){
    try{ return tauriApi().window.getCurrentWindow(); }catch(_){ return null; }
  }
  const wMin = $('winMin'), wMax = $('winMax'), wClose = $('winClose');
  if(wMin) wMin.addEventListener('click', async e=>{ e.stopPropagation(); const w=win(); if(w) await w.minimize(); });
  if(wMax) wMax.addEventListener('click', async e=>{ e.stopPropagation(); const w=win(); if(w) await w.toggleMaximize(); });
  if(wClose) wClose.addEventListener('click', async e=>{ e.stopPropagation(); const w=win(); if(w) await w.close(); });
  const tb = $('titlebar');
  if(tb){
    tb.addEventListener('dblclick', async e=>{
      if(e.target.closest('button, a, input, select, .menu, .title-actions')) return;
      const w = win(); if(w) await w.toggleMaximize();
    });
  }
})();


/* lazy thumbs: only decode what's on screen */
let thumbIO = null;
function observeThumbs(root){
  if(!('IntersectionObserver' in window)){
    root.querySelectorAll('img.thumb[data-src]').forEach(img=>{
      img.src = img.dataset.src; img.removeAttribute('data-src');
    });
    return;
  }
  if(thumbIO) thumbIO.disconnect();
  thumbIO = new IntersectionObserver((entries)=>{
    for(const en of entries){
      if(!en.isIntersecting) continue;
      const img = en.target;
      const src = img.dataset.src;
      if(src){
        img.src = src;
        img.removeAttribute('data-src');
      }
      thumbIO.unobserve(img);
    }
  }, { root: gridWrap, rootMargin: '80px 0px', threshold: 0.01 });
  root.querySelectorAll('img.thumb[data-src]').forEach(img=>thumbIO.observe(img));
}

/* magnetic buttons — GPU transform, rAF-throttled, only while hovered */
(function(){
  const MAX = 7;
  let active = null, raf = 0, mx = 0, my = 0, frozen = false;
  const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduced) return;

  function clearActive(){
    if(active && active.isConnected){
      active.style.transform = '';
      active.classList.remove('is-mag');
    }
    active = null;
    if(raf){ cancelAnimationFrame(raf); raf = 0; }
  }
  function frame(){
    raf = 0;
    if(frozen || !active || !active.isConnected) return;
    const r = active.getBoundingClientRect();
    if(!r.width || !r.height) return;
    const x = (mx - r.left - r.width/2) / (r.width/2);
    const y = (my - r.top - r.height/2) / (r.height/2);
    const dx = Math.max(-MAX, Math.min(MAX, x * MAX));
    const dy = Math.max(-MAX, Math.min(MAX, y * MAX));
    active.style.transform = 'translate3d('+dx.toFixed(1)+'px,'+dy.toFixed(1)+'px,0)';
  }
  document.addEventListener('pointerover', e=>{
    if(frozen) return;
    const el = e.target.closest && e.target.closest('.magnetic');
    if(!el) return;
    if(active && active !== el) clearActive();
    active = el;
    active.classList.add('is-mag');
  }, true);
  document.addEventListener('pointerout', e=>{
    if(!active) return;
    const leaving = e.target.closest && e.target.closest('.magnetic');
    if(leaving === active && !(e.relatedTarget && active.contains(e.relatedTarget))) clearActive();
  }, true);
  document.addEventListener('pointermove', e=>{
    if(frozen || !active) return;
    mx = e.clientX; my = e.clientY;
    if(!raf) raf = requestAnimationFrame(frame);
  }, { passive:true });
  document.addEventListener('visibilitychange', ()=>{
    frozen = document.hidden;
    if(frozen) clearActive();
  });
  window.addEventListener('blur', ()=>{ frozen = true; clearActive(); });
  window.addEventListener('focus', ()=>{ frozen = document.hidden; });
})();


/* debounce search input — avoid full grid rebuild every keystroke */
function debounce(fn, ms){
  let t = 0;
  return function(){
    const args = arguments, self = this;
    clearTimeout(t);
    t = setTimeout(()=>fn.apply(self, args), ms);
  };
}

/* ---------- Init ---------- */
async function waitTauri(ms){
  const t0 = Date.now();
  while(Date.now()-t0 < (ms||8000)){
    if(getInvoke()) return true;
    await new Promise(r=>setTimeout(r,40));
  }
  return !!getInvoke();
}
async function hydrateLibrary(){
  const list = await apiList().catch(e=>{ console.error('list', e); throw e; });
  state.items = Array.isArray(list) ? list : (list && list.items) || [];
  renderSidebar();
  applyFilters();
  if(state.selectedId){
    const still = findItem(state.selectedId);
    if(still) renderDetail(still);
  } else if(state.currentId){
    selectWallpaper(state.currentId);
  } else if(state.items[0]){
    selectWallpaper(state.items[0].id);
  } else {
    renderDetail(null);
  }
}

(async function init(){
  try{
    const ok = await waitTauri(8000);
    if(!ok) throw new Error('Tauri API not ready');
    const [list, settings, cur] = await Promise.all([
      apiList().catch(e=>{ console.error('list', e); throw e; }),
      apiSettings().catch(()=>({settings:DEFAULT_SETTINGS})),
      apiCurrent().catch(()=>({id:null}))
    ]);
    console.log('list type', typeof list, Array.isArray(list), list && list.length);
    state.items = Array.isArray(list) ? list : (list && list.items) || [];
    state.settings = mapServerSettings(settings.settings || settings);
    state.currentId = (cur && cur.id) || null;
    renderSidebar();
    applyFilters();
    if(state.currentId) selectWallpaper(state.currentId);
    else if(state.items[0]) selectWallpaper(state.items[0].id);
    else renderDetail(null);
    if(!state.items.length) await runScan();
    // Sync Steam Mode UI: startup with toggle off by default (we never init Steamworks without explicit user action)
    state.steamOn = false;
    steamToggle.classList.remove('on');
    steamToggle.setAttribute('aria-checked', 'false');
    tabWorkshop.classList.add('disabled');
    // Workshop events must attach after Tauri IPC is live (not at script parse time).
    if(!listenWorkshop()){
      // rare: API shape late; retry once
      setTimeout(()=>listenWorkshop(), 500);
    }
    // Backend may finish thumb backfill after window show — refresh grid once ready.
    (function listenLibraryUpdated(){
      const handler = ()=>{ hydrateLibrary().catch(()=>{}); };
      try{
        const a = tauriApi();
        const listen = a.event && a.event.listen;
        if(typeof listen === 'function'){
          listen('library-updated', handler);
          return;
        }
      }catch(_){}
      // Soft poll if events unavailable: thumbs finish within a few seconds.
      setTimeout(()=>{ hydrateLibrary().catch(()=>{}); }, 2500);
      setTimeout(()=>{ hydrateLibrary().catch(()=>{}); }, 8000);
    })();
  } catch(e){
    console.error('init failed', e);
    grid.innerHTML = '<div class="grid-empty">'+svg('info','i-lg')
      + '<div>backend error</div>'
      + '<div style="font-size:12px">'+String(e && e.message || e)+'</div></div>';
    counter.innerHTML = '<b>0</b> / 0';
  }
})();

// soft auto-rescan every 60s while tab open
// optional soft refresh: only if library empty (Steam download mid-session)
setInterval(()=>{ if(!document.hidden && !state.scanning && state.items.length===0) runScan().catch(()=>{}); }, 30000);
</script>
